<!DOCTYPE html>
<html>
<head>
    <title>Interactive JavaScript</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        button {
            background-color: #FF9800;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #e68900;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="mainHeading">Welcome to JavaScript!</h1>
        <p id="description">Click the buttons below to see JavaScript in action.</p>
        
        <button onclick="changeHeading()">Change Heading</button>
        <button onclick="changeColor()">Change Color</button>
        <button onclick="showDate()">Show Date</button>
        <button onclick="resetAll()">Reset</button>
    </div>
    
    <script>
        function changeHeading() {
            document.getElementById("mainHeading").innerHTML = "JavaScript is Amazing!";
        }
        
        function changeColor() {
            const colors = ['#FF9800', '#F44336', '#4CAF50', '#2196F3', '#9C27B0'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById("mainHeading").style.color = randomColor;
        }
        
        function showDate() {
            document.getElementById("description").innerHTML = "Current date and time: " + new Date();
        }
        
        function resetAll() {
            document.getElementById("mainHeading").innerHTML = "Welcome to JavaScript!";
            document.getElementById("mainHeading").style.color = "black";
            document.getElementById("description").innerHTML = "Click the buttons below to see JavaScript in action.";
        }
    </script>
</body>
</html>
